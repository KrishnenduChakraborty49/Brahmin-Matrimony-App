version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: brahmin_milan_db
    restart: always
    environment:
      MYSQL_DATABASE: brahmin_milan_db
      MYSQL_ROOT_PASSWORD: chakraborty@123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brahmin_milan_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/brahmin_milan_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=chakraborty@123
    depends_on:
      - db

volumes:
  db_data:
